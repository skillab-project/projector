[tool.mutmut]
paths_to_mutate = [
    "app/services/analytics/occupations.py",
    "app/services/analytics/sectoral.py",
    "app/services/esco_loader.py",
]
also_copy = [
    "app/__init__.py",
    "app/test.py",
    "app/main.py",
    "app/api/",
    "app/client/",
    "app/core/",
    "app/schemas/",
    "app/services/analytics/market.py",
    "app/services/analytics/regional.py",
    "app/services/analytics/trends.py",
    "app/services/projector_service.py",
]
tests_dir = ["app/test.py"]
pytest_add_cli_args_test_selection = [
    "-m",
    "not asyncio",
    "-k",
    "not endpoint and not dashboard and not test_fetch_occupation_labels_integration_real",
]
pytest_add_cli_args = ["-q"]
mutate_only_covered_lines = true

[tool.coverage.run]
branch = true
source = ["app"]
omit = [
    "app/test.py",
]

[tool.coverage.report]
precision = 1
show_missing = true

[tool.quality_gates]
coverage = 78
mutation_advisory = 55
