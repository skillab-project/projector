[tool.mutmut]
paths_to_mutate = [
    "app/services/analytics/occupations.py",
    "app/services/analytics/sectoral.py",
    "app/services/esco_loader.py",
]
also_copy = [
    "app/__init__.py",
    "app/test.py",
    "app/main.py",
    "app/api/",
    "app/client/",
    "app/core/",
    "app/schemas/",
    "app/services/analytics/market.py",
    "app/services/analytics/regional.py",
    "app/services/analytics/trends.py",
    "app/services/projector_service.py",
]
tests_dir = ["app/test.py"]
pytest_add_cli_args_test_selection = [
    "-m",
    "not asyncio",
    "-k",
    "not endpoint and not dashboard and not test_fetch_occupation_labels_integration_real",
]
pytest_add_cli_args = ["-q"]
mutate_only_covered_lines = true

[tool.coverage.run]
branch = true
source = ["app"]
omit = [
    "app/test.py",
]

[tool.coverage.report]
precision = 1
show_missing = true

[tool.quality_gates]
coverage = 78
mutation_advisory = 55

[tool.quality_checks.tests]
label = "Pytest"
mode = "Enforced"
jenkins_result = "SUCCESS when pytest exits with code 0"
rule = "Controlled by pytest exit code in Jenkins"

[tool.quality_checks.coverage]
label = "Coverage"
mode = "Enforced"
jenkins_result = "SUCCESS when coverage gate passes"
rule = "Total coverage must meet the configured coverage gate"

[tool.quality_checks.mutation]
label = "Mutation"
mode = "Advisory"
jenkins_result = "SUCCESS when mutation analysis and reports are generated"

[tool.quality_checks.lint]
label = "Lint"
mode = "Report only"
jenkins_result = "SUCCESS when lint reports are generated"
rule = "Reports are archived; no blocking gate configured"
